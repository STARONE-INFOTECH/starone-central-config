# ==========================================
# 🚀 STARONE PROJECT - STANDARD LABEL SETUP
# ==========================================
# Use this file with github-label-sync or a GitHub Action to auto-sync labels
# across all backend repositories (config, services, infra, etc.)

# -----------------------------
# 🧱 TYPE LABELS (what kind of issue)
# -----------------------------
- name: feature
  color: 1E90FF
  description: "New functionality or feature development"

- name: enhancement
  color: 32CD32
  description: "Improvement to an existing feature or service"

- name: bug
  color: FF4500
  description: "Fix for a defect or broken functionality"

- name: documentation
  color: FFD700
  description: "Documentation changes, README updates, or Wiki tasks"

- name: refactor
  color: 9370DB
  description: "Code cleanup or technical debt improvement"

- name: test
  color: 00CED1
  description: "Test creation, improvement, or maintenance"

# -----------------------------
# ⚙️ AREA LABELS (where the work applies)
# -----------------------------
- name: backend
  color: 7B68EE
  description: "Work related to backend APIs, microservices, or business logic"

- name: frontend
  color: FFA500
  description: "UI-related work for the React or Angular client applications"

- name: config-server
  color: 2E8B57
  description: "Spring Cloud Config Server related tasks or implementation"

- name: central-config-repo
  color: 556B2F
  description: "Tasks related to maintaining configuration properties and YAMLs in central repo"

- name: infrastructure
  color: 708090
  description: "Infrastructure setup, provisioning, environment configuration, or server management"

- name: vault
  color: 006400
  description: "Tasks related to HashiCorp Vault integration or secret management"

- name: ci-cd
  color: 778899
  description: "Build pipelines, GitHub Actions, Jenkins, or deployment scripts"

- name: database
  color: 20B2AA
  description: "Database schema, migration, or query-related work"

- name: kafka
  color: A52A2A
  description: "Tasks related to Kafka messaging, producers, or consumers"

- name: spring-cloud
  color: 008B8B
  description: "Spring Cloud-specific configurations or integrations"

# -----------------------------
# 🧩 PRIORITY LABELS
# -----------------------------
- name: high-priority
  color: DC143C
  description: "Critical issue that must be resolved immediately or blocks release"

- name: medium-priority
  color: FFA07A
  description: "Important issue, should be resolved in the current or next sprint"

- name: low-priority
  color: 90EE90
  description: "Non-blocking or low-impact issue"

# -----------------------------
# 🔒 SECURITY LABELS
# -----------------------------
- name: security
  color: 800000
  description: "Security-related issue: credentials, encryption, or vulnerabilities"

- name: compliance
  color: 191970
  description: "Issues ensuring compliance with standards, policies, or governance"

# -----------------------------
# 🚦 WORKFLOW / STATUS LABELS
# -----------------------------
- name: todo
  color: D3D3D3
  description: "Planned task not yet started"

- name: in-progress
  color: FFC300
  description: "Task currently in development or under implementation"

- name: review
  color: 4682B4
  description: "Work ready for code review or PR review"

- name: done
  color: 228B22
  description: "Completed and merged work"

- name: blocked
  color: FF0000
  description: "Work blocked by dependency or external issue"

# -----------------------------
# 🧠 CATEGORY / DOMAIN LABELS
# -----------------------------
- name: api
  color: 1E90FF
  description: "Endpoints, request/response contracts, or OpenAPI specifications"

- name: integration
  color: 483D8B
  description: "Integration with external APIs, services, or modules"

- name: performance
  color: 2F4F4F
  description: "Performance improvements, caching, or load handling"

- name: logging
  color: 808000
  description: "Logging improvements or observability changes"

- name: monitoring
  color: 6A5ACD
  description: "Monitoring, metrics, alerts, or dashboards"

- name: deployment
  color: 708090
  description: "Deployment pipeline or release automation"

# -----------------------------
# 👥 TEAM LABELS
# -----------------------------
- name: backend-team
  color: 6495ED
  description: "Assigned to backend developers"

- name: devops-team
  color: 2F4F4F
  description: "Assigned to DevOps or Infra team"

- name: qa-team
  color: 8B0000
  description: "Assigned to QA or testing team"

- name: frontend-team
  color: FFA07A
  description: "Assigned to frontend developers"

