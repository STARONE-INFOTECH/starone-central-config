version: "3.9"

services:
  vault-main:
    image: hashicorp/vault:1.16.1
    container_name: vault-main
    restart: always
    ports:
      - "8200:8200"
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: root
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    command: server -dev -dev-root-token-id=root
