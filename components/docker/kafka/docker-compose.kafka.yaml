# common/infra/kafka/docker-compose.kafka.yaml
services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.7.1   # ← use latest 7.x (7.1.15 is very old now)
    container_name: starone-zookeeper          # optional but nice for logs
    hostname: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zoo_data:/var/lib/zookeeper/data
      - zoo_logs:/var/lib/zookeeper/log
    healthcheck:
      test: ["CMD", "bash", "-c", "echo ruok | nc localhost 2181 | grep imok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  kafka:
    image: confluentinc/cp-kafka:7.7.1       # ← same version as zookeeper
    container_name: starone-kafka
    hostname: kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181

      # Single clean listener – perfect for local dev
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://host-gateway:9093   # ← for linux
      #KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1

      # Nice-to-have defaults (optional but recommended)
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168          # 7 days
      KAFKA_LOG_SEGMENT_BYTES: 1073741824     # 1GB
      KAFKA_LOG_RETENTION_CHECK_INTERVAL_MS: 300000
    ports:
      - "9093:9093"                            # external access
    volumes:
      - kafka_data:/var/lib/kafka/data
    extra_hosts:
      - "host-gateway:host-gateway"         # Docker 20.10+ magic
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9093", "--list"]
      interval: 15s
      timeout: 10s
      retries: 6
      start_period: 30s

  schema-registry:
    image: confluentinc/cp-schema-registry:7.7.1
    container_name: starone-schema-registry
    hostname: schema-registry
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: PLAINTEXT://kafka:9093
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
      # Optional but recommended
      SCHEMA_REGISTRY_SCHEMA_COMPATIBILITY: BACKWARD
    ports:
      - "8081:8081"
# Move volumes & networks OUT of this file → define them only in the global file